spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: User Service
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/postgres}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: validate

server:
  port: ${SERVER_PORT:8080}
